<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Turanova Software Giriş Yap SOS</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* siyah arka plan */
            color: #fff; /* varsayılan metin beyaz */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background-color: #111;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #f00;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #fff;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px solid #f00;
            border-radius: 8px;
            background-color: #222;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }

            input:focus {
                outline: none;
                border-color: #fff;
                background-color: #333;
            }

        button {
            background-color: #f00;
            color: #fff;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

            button:hover {
                background-color: #cc0000;
            }

        #mesaj {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Giriş Formu</h2>

        <label for="kullanici">Kullanıcı Adı:</label>
        <input type="text" id="kullanici" placeholder="Kullanıcı adınızı girin">

        <label for="sifre">Şifre:</label>
        <input type="password" id="sifre" placeholder="Şifrenizi girin">

        <button onclick="girisYap()">Giriş Yap</button>

        <p id="mesaj"></p>
    </div>

    <script src="JHVWBFÖNWFJMKoURMAUOLhklnjavmmaKorumahkbJHSJKHjh.js"></script>
</body>
</html>
