<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <title>Turanova Mors Gizli Haberleşme</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #111;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            width: 90%;
            max-width: 700px;
        }

        h2, h3 {
            color: #f00;
            text-align: center;
        }

        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
            border: 2px solid #f00;
            border-radius: 8px;
            background-color: #222;
            color: #fff;
            font-size: 16px;
            resize: none;
            transition: 0.3s;
        }

            textarea:focus {
                outline: none;
                border-color: #fff;
                background-color: #333;
            }

        button {
            background-color: #f00;
            color: #fff;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

            button:hover {
                background-color: #cc0000;
            }

        p {
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        hr {
            border: 1px solid #f00;
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Turanova Mors Gizli Haberleşme</h2>

        <h3>1. Yazıyı Mors'a çevir</h3>
        <textarea id="metin" rows="4" placeholder="Yazı girin..."></textarea>
        <button onclick="yaziToMors()">Mors'a Çevir</button>
        <p><strong>Sonuç:</strong></p>
        <p id="morsSonuc"></p>

        <hr>

        <h3>2. Mors'u Yazıya çevir</h3>
        <textarea id="mors" rows="4" placeholder="Mors kodu girin... (örn: .... . .-.. .-.. ---)"></textarea>
        <button onclick="morsToYazi()">Yazıya Çevir</button>
        <p><strong>Sonuç:</strong></p>
        <p id="yaziSonuc"></p>
    </div>


    <script src="JHVWBFÖNWFJMKoURMAUOLhklnjavmmaKorumahkbJHSJKHjh.js"></script>
</body>
</html>
